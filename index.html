<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Xatspace Pro – Glassmorphism Exclusive</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f2027, #203243, #2c3e64);
      overflow: hidden;
    }

    body::before {
      content: "";
      position: absolute;
      width: 400px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 102, 255, 0.35), transparent 70%);
      top: -150px;
      left: -150px;
      filter: blur(80px);
    }

    body::after {
      content: "";
      position: absolute;
      width: 400px;
      height: 600px;
      background: radial-gradient(circle, rgba(0, 153, 255, 0.35), transparent 70%);
      bottom: -150px;
      right: -150px;
      filter: blur(80px);
    }

    .xat-container {
      position: relative;
      width: 900px;
      min-height: 520px;
      background: transparent;
      border-radius: 0;
      box-shadow: none;
    }

    /* CAPA AZUL TRASERA */
    .xat-container::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, #0077ff, #006eff, #2f89ff);
      transform: rotate(-6deg);
      border-radius: 14px;
      z-index: 1;
      box-shadow: 0 25px 50px rgba(0,0,0,0.45);
    }

    /* CAPA BLANCA FRONTAL */
    .xat-container::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(141, 207, 245, 0.596), rgba(158, 208, 231, 0.925));
      transform: rotate(3deg);
      border-radius: 14px;
      z-index: 2;
      box-shadow: 0 18px 40px rgba(0,0,0,0.35);
    }

    /* CONTENIDO REAL */
    .xat-container > * {
      position: relative;
      z-index: 3;
      background: rgba(212, 233, 250, 0.15);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.35);
      color: #000;
      overflow: hidden;
    }


    .xat-container > * {
      background: rgba(198, 228, 248, 0.12);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 30px;
      border: 1px solid rgba(255,255,255,0.25);
      overflow: hidden;
    }

    /* HEADER */
    .header {
      display: flex;
      align-items: center;
      padding: 26px;
      background: linear-gradient(135deg, rgba(196, 228, 250, 0.493), rgba(255,255,255,0.05));
      border-bottom: 1px solid rgba(255,255,255,0.25);
    }

    .profile-pic {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 22px;
      border: 3px solid rgba(179, 223, 248, 0.6);
      box-shadow: 0 0 20px rgba(255,255,255,0.35);
    }

    .user-info h1 {
      font-size: 70px;
      font-weight: 700;
      letter-spacing: 1px;
    }

    .user-info span {
      font-size: 20px;
     color:#fff;
      opacity:0.9;
      letter-spacing: 2px;
    }

    /* NAV */
    .nav {
      display: flex;
      justify-content: center;
      gap: 20px;
      padding: 18px;
      background: rgba(193, 247, 235, 0.349);
      border-bottom: 1px solid rgba(255,255,255,0.18);
    }

.nav button{
  position:relative;
  padding:14px 32px;
  font-size:14px;
  letter-spacing:2px;
  color:#fff;
  border:none;
  border-radius:20px;
  cursor:pointer;

  background:
    linear-gradient(135deg,
      rgba(0, 255, 213, 0.356),
      rgba(0, 81, 255, 0.247)
    );

  backdrop-filter:blur(10px);
  overflow:hidden;

  box-shadow:
    inset 0 1px 0 rgba(255,255,255,.45),
    0 10px 25px rgba(0,0,0,.25);

  transition:
    transform .35s ease,
    box-shadow .35s ease;
}

.nav button:hover{
  transform:translateY(-3px);
  box-shadow:
    inset 0 1px 0 rgba(255, 255, 255, 0.24),
    0 15px 35px rgba(0, 0, 0, 0.137),
    0 0 20px rgba(0, 255, 213, 0.288);
}


.nav button::after{
  animation: glassMove 2.5s ease-in-out infinite;
}

@keyframes glassMove{
  0%{
    left:-40%;
  }
  15%{
    left:120%;
  }
  100%{
    left:120%;
  }
}

.nav button::after{
  content:"";
  position:absolute;
  top:-20%;
  left:-40%;
  width:30%;
  height:140%;

  background:linear-gradient(
    to right,
    transparent,
    rgba(255,255,255,.6),
    transparent
  );

  filter:blur(2px);
  opacity:.7;
  transform:skewX(-10deg);
  pointer-events:none;

  animation:glassMove 10.5s ease-in-out infinite;
}


    /* CONTENT */
    .content {
      padding: 30px;
      min-height: 300px;
    }

    .section {
      display: none;
      animation: fade 0.45s ease;
    }

    .section.active { display: block; }

    @keyframes fade {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }




    /* SIGNATURE */
    .signature {
      text-align: center;
      padding: 18px;
      font-size: 13px;
      letter-spacing: 3px;
      background: rgba(255,255,255,0.08);
      border-top: 1px solid rgba(255,255,255,0.2);
      color: #e0e6ff;
    }

    .signature strong {
      color: #fff;
      text-shadow: 0 0 12px rgba(255,255,255,0.6);
    }

/* OVERLAY */
.enter-overlay{
  position: fixed;
  inset: 0;
  display:flex;
  justify-content:center;
  align-items:center;
  background:rgba(0,0,0,.25);
  z-index:99999;
}

/* CONTENEDOR */
.enter-wrapper{
  position:relative;
  width:340px;
  height:90px;
  cursor:pointer;
}

/* CIRCULO */
.enter-circle{
  position:absolute;
  left:0;
  top:50%;
  transform:translateY(-50%);
  width:110px;
  height:110px;
  border-radius:50%;

  /* VIDRIO + COLOR */
  background:
    radial-gradient(circle at 30% 25%, rgba(255,255,255,.9), rgba(255,255,255,.15) 35%, rgba(0,0,0,.15) 70%),
    linear-gradient(145deg, rgb(6, 101, 190), rgb(2, 77, 120));

  backdrop-filter: blur(10px);

  display:flex;
  justify-content:center;
  align-items:center;

  /* TEXTO */
  font-weight:800;
  font-size:15px;
  letter-spacing:1.5px;
  color:#fff;
  text-shadow:
    0 1px 1px rgba(0,0,0,.35),
    0 0 8px rgba(255,255,255,.6);

  /* VOLUMEN 3D */
  box-shadow:
    inset 0 3px 6px rgba(255,255,255,.65),
    inset 0 -6px 10px rgba(0,0,0,.25),
    0 18px 35px rgba(0,0,0,.45),
    0 0 0 4px rgba(255,255,255,.35);

  z-index:3;

  animation: glassPulse 3s ease-in-out infinite;
  transition:1s cubic-bezier(.22,1,.36,1);
}
.enter-circle::before{
  content:"";
  position:absolute;
  inset:8px;
  border-radius:50%;
  background:linear-gradient(
    135deg,
    rgba(255,255,255,.85),
    rgba(255,255,255,0) 60%
  );
  opacity:.6;
  pointer-events:none;
}

@keyframes glassPulse{
  0%{
    box-shadow:
      inset 0 3px 6px rgba(255,255,255,.65),
      inset 0 -6px 10px rgba(0,0,0,.25),
      0 18px 35px rgba(0,0,0,.45),
      0 0 0 4px rgba(255,255,255,.35);
    opacity:.95;
  }
  50%{
    box-shadow:
      inset 0 4px 10px rgba(255,255,255,.85),
      inset 0 -8px 14px rgba(0,0,0,.3),
      0 22px 45px rgba(0,0,0,.55),
      0 0 0 4px rgba(255,255,255,.45);
    opacity:1;
  }
  100%{
    opacity:.95;
  }
}


/* RECTANGULO */
.enter-bar{
  position:absolute;
  left:60px;
  top:50%;
  transform:translateY(-50%);
  width:260px;
  height:90px;
  border-radius:40px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(18px);
  display:flex;
  justify-content:center;
  align-items:center;
  gap:14px;
  box-shadow:
    inset 0 0 18px rgba(255,255,255,.35),
    0 15px 30px rgba(0,0,0,.35);
  transition:1s cubic-bezier(.22,1,.36,1);
}

/* FLECHAS */
.enter-bar span{
  font-size:22px;
  opacity:.35;
  animation:arrows 1.4s infinite;
}

.enter-bar span:nth-child(2){animation-delay:.15s}
.enter-bar span:nth-child(3){animation-delay:.3s}

@keyframes arrows{
  0%{transform:translateX(0);opacity:.3}
  50%{transform:translateX(6px);opacity:1}
  100%{transform:translateX(0);opacity:.3}
}

/* CLICK → SEPARACIÓN */
.enter-wrapper.open .enter-circle{
  transform:translate(-160px,-50%) scale(.9);
  opacity:0;
}

.enter-wrapper.open .enter-bar{
  transform:translate(180px,-50%) scale(.9);
  opacity:0;
}

.enter-overlay.fade{
  opacity:0;
  pointer-events:none;
  transition:.8s ease;
}


/* ============================
   🎧 MUSIC WIDGET
============================ */

/* CONTENEDOR GENERAL */
.music-widget {
  position: fixed;   /* 🔥 CLAVE */
  right: calc(50% - 450px - 80px);
  top: 70%;
  transform: translateY(-50%);

  display: none;
  align-items: center;
  z-index: 9999;
}



/* SE HABILITA LUEGO DEL ENTER */
.music-widget.show{
  display:flex;
}


/* ============================
   🔵 CÍRCULO (BOTÓN)
============================ */
.music-circle{
  position:relative;
  z-index:3;                 /* siempre encima */
  width:130px;
  height:130px;
  border-radius:50%;

  background:
    radial-gradient(circle at 30% 25%, rgba(200, 242, 255, 0.9), rgba(255,255,255,.15) 35%, rgba(0,0,0,.15) 70%),
    linear-gradient(145deg, rgb(6, 101, 190), rgb(2, 77, 120));
  display:flex;
  justify-content:center;
  align-items:center;

  font-weight:800;
  font-size:13px;
  letter-spacing:1.5px;
  color:#fff;
  cursor:pointer;

  box-shadow:
    inset 0 3px 6px rgba(255,255,255,.6),
    0 18px 35px rgba(0,0,0,.45);
}


/* ============================
   ▭ PANEL DESPLEGABLE
============================ */
.music-panel{
  position:absolute;
  left:50px;               /* ⬅️ arranca a la derecha del círculo */
  top:50%;
  transform:translateY(-50%) translateX(-30px);

  width:290px;
  height:100px;

  border-radius:60px;
  background:rgba(255,255,255,.18);
  backdrop-filter:blur(18px);

  display:flex;
  flex-direction:column;
  justify-content:center;
  gap:8px;

  padding-left:40px;
  padding-right:30px;

  opacity:0;
  pointer-events:none;
  z-index:1;

  box-shadow:
    inset 0 0 18px rgba(255,255,255,.35),
    0 15px 30px rgba(0,0,0,.35);

  transition:
    transform .6s cubic-bezier(.22,1,.36,1),
    opacity .4s ease;
}


/* HOVER → SALE EL PANEL */
.music-widget:hover .music-panel{
  transform:translateY(-50%) translateX(0);
  opacity:1;
  pointer-events:auto;
}



/* ============================
   🎵 INFO DE LA CANCIÓN
============================ */
.music-info{
  margin-left: 80px;
  display:flex;
  flex-direction:column;
  gap:2px;
  color:#000;
}

.music-info .title{
  font-size:15px;
  font-weight:600;
  line-height:1.2;
}

.music-info .artist{
  font-size:12px;
  opacity:.65;
  letter-spacing:.5px;
}


/* ============================
   ⏯ CONTROLES
============================ */
.music-controls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-left:30px;
  margin-top:5px;
}

.music-controls button{
  width:32px;
  height:32px;
  border-radius:50%;
  border:none;

  background:rgba(255,255,255,.35);
  backdrop-filter:blur(8px);

  cursor:pointer;
  box-shadow:0 6px 15px rgba(0,0,0,.35);
  transition:.25s ease;
}

.music-controls button:hover{
  transform:scale(1.12);
}
/* =========================
   SOBRE MI
========================= */

.sobremi{
  text-align:center;
}

/* NOMBRE */
.sobremi-name{
  margin-bottom:14px;
  font-size:24px;
  font-weight:800;
  letter-spacing:1.5px;

  background:linear-gradient(
    120deg,
    #00ffd5,
    #00a3ff,
    #0066ff,
    #2f3dff
  );
  background-size:300% 300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:gradientMove 6s ease-in-out infinite;

  text-shadow:0 0 12px rgba(255,255,255,.35);
}


/* PAÍS */
.sobremi-country{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:10px;
  margin-bottom:22px;
}

.country-text{
  font-size:14px;
  font-weight:600;
  letter-spacing:1.5px;

  background:linear-gradient(
    120deg,
    #ffffff,
    #00ffd5,
    #00a3ff
  );
  background-size:200% 200%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:gradientMove 5s ease-in-out infinite;
}


.sobremi-country img{
  border-radius:100px;
  box-shadow:0 0 8px rgba(0,0,0,0.25);
}

/* BOTÓN SALA */
.sobremi-room{
  display:inline-block;
  margin-bottom:25px;
  padding:6px 17px;
  border-radius:20px;
  text-decoration:none;
  color:#fff;
  font-weight:600;
  letter-spacing:2px;
  background:linear-gradient(135deg,#00ffd5,#00a3ff);
  box-shadow:0 0 20px rgba(0,163,255,0.45);
  transition:.3s ease;
}

.sobremi-room:hover{
  transform:scale(1.06);
  box-shadow:0 0 30px rgba(0,163,255,0.65);
}

/* FRASE */
.sobremi-quote{
  margin-top:10px;
  padding:18px 26px;

  font-size:16px;
  font-style:italic;
  letter-spacing:1px;
  line-height:1.6;

  color:#ffffffef;
  text-align:center;

  background:rgba(92, 224, 207, 0.397);
  backdrop-filter:blur(16px);
  -webkit-backdrop-filter:blur(16px);

  border-radius:22px;
  border:1px solid rgba(255, 255, 255, 0.089);

  box-shadow:
    inset 0 0 18px rgba(255, 255, 255, 0.11),
    0 15px 35px rgba(0, 0, 0, 0.171);

  width:820px;
  margin-left:auto;
  margin-right:auto;
}

/* =========================
   MODAL MARRIED
========================= */

.married-modal{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;

  background:rgba(196, 107, 126, 0.55);   /* fondo transparente */
  backdrop-filter: blur(14px);

  z-index:999999;               /* MÁS ALTO que todo */
  opacity:0;
  pointer-events:none;
  transition:opacity .4s ease;
}
.married-modal.active{
  opacity:1;
  pointer-events:auto;
}


/* TARJETA */
.married-card{
  position:relative;
  width:460px;
  height:570px;
  padding:30px 25px;
  text-align:center;

  background:rgba(233, 106, 127, 0.568);
  backdrop-filter:blur(25px);
  border-radius:28px;
  border:1px solid rgba(255,255,255,.35);

  box-shadow:
    0 25px 60px rgba(0,0,0,.45),
    inset 0 0 25px rgba(255,255,255,.2);

  animation:pop .5s ease;
}

@keyframes pop{
  from{transform:scale(.85);opacity:0}
  to{transform:scale(1);opacity:1}
}

/* CERRAR */
.married-close{
  position:absolute;
  top:15px;
  right:18px;
  font-size:18px;
  cursor:pointer;
  opacity:.6;
}
.married-close:hover{opacity:1}

/* FOTO */
.married-photo{
  width:200px;
  height:200px;
  border-radius:50%;
  object-fit:cover;
  border:3px solid rgba(252, 194, 213, 0.6);
  box-shadow:0 0 25px rgba(255,255,255,.5);
  margin-bottom:15px;
}

/* TEXTO */
.married-name{
  font-size:22px;
  letter-spacing:1px;
}

.married-info{
  margin:10px 0 18px;
  font-size:14px;
  opacity:.85;
  display:flex;
  justify-content:center;
  gap:14px;
}

.married-country{
  display:flex;
  align-items:center;
  gap:6px;
}

.married-country img{
  width:22px;
  border-radius:3px;
}

/* FRASE */
.married-quote{
  font-style:italic;
  font-size:15px;
  margin-bottom:30px;
  min-height:40px;
}

/* BOTÓN */
.married-xat{
  display:inline-block;
  margin-top:15%;
  padding:8px 20px;
  border-radius:20px;
  text-decoration:none;
  font-weight:600;
  letter-spacing:2px;
  color:#fff;

  background:linear-gradient(135deg,#ff4f8a,#ff004c);
  box-shadow:0 0 22px rgba(255, 0, 106, 0.55);
  transition:.3s ease;
}

.married-xat:hover{
  transform:scale(1.08);
}



/* =========================
   GALLERY – DRAG SLIDER
========================= */

.gallery-wrapper{
  position:relative;
  width:100%;
  overflow:hidden;
  padding:20px 0;
  cursor:grab;
}

.gallery-wrapper:active{
  cursor:grabbing;
}

.gallery-track{
  display:flex;
  gap:35px;
  user-select:none;
  will-change:transform;
}

/* TARJETA */
.gallery-card{
  min-width:140px;
  height:210px;
  border-radius:26px;
  overflow:hidden;

  background:
    linear-gradient(135deg,
      rgba(0,255,213,.25),
      rgba(127,0,255,.25)
    ),
    rgba(255, 255, 255, 0.075);

  backdrop-filter:blur(22px);
  border:2px solid rgba(140, 210, 250, 0.651);

  box-shadow:
    0 25px 45px rgba(110, 110, 110, 0.089),
    inset 0 0 25px rgba(255, 255, 255, 0.123);

  transition:
    transform .45s cubic-bezier(.22,1,.36,1),
    box-shadow .45s ease;
}

/* IMAGEN */
.gallery-card img{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:22px;
  pointer-events:none;
}

/* HOVER – profundidad */
.gallery-card:hover{
  transform:translateY(-14px) scale(1.05) rotateZ(-0.5deg);
  box-shadow:
    0 35px 70px rgba(66, 66, 66, 0.055),
    inset 0 0 30px rgba(255,255,255,.35);
}

.btn-married{
  background:
    linear-gradient(135deg,#ff2d55,#ff6aa2) !important;

  box-shadow:
    0 0 25px rgba(255,45,85,.75),
    inset 0 1px 0 rgba(255,255,255,.55);

  animation:heartPulse 2s infinite;
}
@keyframes heartPulse{
  0%{
    box-shadow:
      0 0 20px rgba(255,45,85,.6),
      inset 0 1px 0 rgba(255,255,255,.55);
  }
  50%{
    box-shadow:
      0 0 40px rgba(255,45,85,.95),
      inset 0 1px 0 rgba(255,255,255,.75);
  }
  100%{
    box-shadow:
      0 0 20px rgba(255,45,85,.6);
  }
}
.btn-married:hover{
  transform:scale(1.1);
  box-shadow:
    0 0 60px rgba(255,45,85,1),
    0 0 120px rgba(255,45,85,.6);
}
/* =========================
   🌈 NOMBRE – WAVE GRADIENT
========================= */

/* =========================
   🌊 NOMBRE HEADER – WAVE
========================= */

.user-info .name-wave{
  display:flex;
  font-size:160px;
  font-weight:700;
  letter-spacing:1px;
}

.user-info .name-wave span{
  display:inline-block;

  background:linear-gradient(
    120deg,
    #00aeff,
    #0077ff,
    #0044ff,
    #2f3dff,
    #001aff
  );
  background-size:300% 300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:
    gradientMove 6s ease-in-out infinite,
    opacityWave 2s ease-in-out infinite;

  text-shadow:0 0 10px rgba(255,255,255,.35);
}

/* delay para la onda */
.user-info .name-wave span:nth-child(1){animation-delay:0s}
.user-info .name-wave span:nth-child(2){animation-delay:.12s}
.user-info .name-wave span:nth-child(3){animation-delay:.24s}
.user-info .name-wave span:nth-child(4){animation-delay:.36s}
.user-info .name-wave span:nth-child(5){animation-delay:.48s}
.user-info .name-wave span:nth-child(6){animation-delay:.6s}

@keyframes gradientMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

@keyframes opacityWave{
  0%{opacity:.4}
  50%{opacity:1}
  100%{opacity:.4}
}

/* SOLO la ID */
.user-info > span{
  font-size:12px;   /* 👈 bajá acá lo que quieras */
  color:#fff;
  opacity:0.85;
  letter-spacing:2px;
}
/* =========================
   ✨ WELCOME TEXT – EFECTO
========================= */

.welcome-text{
  display:inline-flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:2px;
  margin-left:25%;
  margin-bottom:40px;
  font-size:26px;
  font-weight:800;
  letter-spacing:1px;
}

.welcome-text span{
  display:inline-block;

  background:linear-gradient(
    120deg,
    #ffffff,
    #00ffd5,
    #0077ff,
    #002fff,
    #ffffff
  );
  background-size:300% 300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:
    welcomeGradient 7s ease-in-out infinite,
    welcomeFloat 3s ease-in-out infinite;

  text-shadow:0 0 12px rgba(255,255,255,.45);
}

/* Delay para efecto onda */
.welcome-text span:nth-child(n){
  animation-delay:calc(var(--i, 0) * 0.08s);
}

/* Gradiente en movimiento */
@keyframes welcomeGradient{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

/* Flotación suave */
@keyframes welcomeFloat{
  0%{transform:translateY(0);opacity:.75}
  50%{transform:translateY(-6px);opacity:1}
  100%{transform:translateY(0);opacity:.75}
}


.married-name{
  margin-top:10px;
  font-size:34px;
  font-weight:800;
  letter-spacing:1.5px;

  background:linear-gradient(
    120deg,
    #00ffd5,
    #00a3ff,
    #0084ff,
    #2f66ff,
    #00ffd5
  );
  background-size:300% 300%;

  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;

  animation:
    gradientMove 6s ease-in-out infinite,
    opacityWave 2.2s ease-in-out infinite;

  text-shadow:0 0 12px rgba(255,255,255,.45);
}
.married-info span{

}
.married-quote{

  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);

  border-radius:22px;
  border:1px solid rgba(255,255,255,.25);

  box-shadow:
    inset 0 0 18px rgba(255,255,255,.18),
    0 15px 35px rgba(0,0,0,.25);
}
.music-circle{
  overflow:hidden;
}

/* LUZ VERTICAL (igual a los botones nav) */
.music-circle::after{
  content:"";
  position:absolute;
  top:-20%;
  left:-40%;
  width:30%;
  height:140%;

  background:linear-gradient(
    to right,
    transparent,
    rgba(255,255,255,.65),
    transparent
  );

  filter:blur(2px);
  opacity:.75;
  transform:skewX(-12deg);
  pointer-events:none;

  animation:radioLight 9s ease-in-out infinite;
}

@keyframes radioLight{
  0%{left:-40%}
  20%{left:120%}
  100%{left:120%}
}
.music-circle::before{
  content:"";
  position:absolute;
  inset:10px;
  border-radius:50%;

  background:
    radial-gradient(circle at center,
      rgba(255,255,255,.25),
      transparent 65%
    );

  box-shadow:
    0 0 25px rgba(0,255,213,.65),
    inset 0 0 18px rgba(255,255,255,.35);

  animation:radioWave 2.6s ease-in-out infinite;
}

@keyframes radioWave{
  0%{transform:scale(.92);opacity:.5}
  50%{transform:scale(1);opacity:1}
  100%{transform:scale(.92);opacity:.5}
}
.music-notes{
  position:absolute;
  inset:0;
  pointer-events:none;
}

.music-notes span{
  position:absolute;
  font-size:18px;
  color:rgba(255,255,255,.85);
  filter:drop-shadow(0 0 6px rgba(0,255,213,.8));

  animation:noteFloat 3.5s ease-in-out infinite;
}

.music-notes span:nth-child(1){
  left:25%;
  top:30%;
  animation-delay:0s;
}

.music-notes span:nth-child(2){
  left:55%;
  top:45%;
  font-size:16px;
  animation-delay:.8s;
}

.music-notes span:nth-child(3){
  left:40%;
  top:60%;
  font-size:14px;
  animation-delay:1.6s;
}

@keyframes noteFloat{
  0%{transform:translateY(0);opacity:.3}
  50%{transform:translateY(-12px);opacity:1}
  100%{transform:translateY(0);opacity:.3}
}
/* Cursor base */
#cursor {
  position: fixed;
  width: 14px;
  height: 14px;
  background: linear-gradient(145deg, #ffffff, #bfbfbf);
  transform: rotate(45deg);
  pointer-events: none;
  z-index: 999999999;
  box-shadow:
    0 0 8px rgba(255,255,255,.6),
    0 0 18px rgba(255,255,255,.35);
  transition: transform .15s ease-out;
}

/* Estela */
.trail {
  position: fixed;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,.7);
  border-radius: 50%;
  pointer-events: none;
  box-shadow: 0 0 10px rgba(255,255,255,.8);
  animation: fadeOut .6s forwards;
}

@keyframes fadeOut {
  to {
    opacity: 0;
    transform: scale(2);
  }
}

/* Onda al click */
.ripple {
  position: fixed;
  width: 20px;
  height: 20px;
  border: 1px solid rgba(255,255,255,.8);
  border-radius: 50%;
  pointer-events: none;
  animation: ripple .6s ease-out forwards;
}

@keyframes ripple {
  from {
    opacity: 1;
    transform: scale(0);
  }
  to {
    opacity: 0;
    transform: scale(6);
  }
}


body, a, button, input, textarea, select {
  cursor: none !important;
}

*,
*::before,
*::after {

  <script>

    function showSection(id) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

const wrapper = document.getElementById("enterWrapper");
const overlay = document.getElementById("enterOverlay");
const xat = document.querySelector(".xat-container");

xat.style.opacity = 0;

const music = document.querySelector('.music-widget');

wrapper.addEventListener("click", () => {
  wrapper.classList.add("open");

  setTimeout(()=>{
    overlay.classList.add("fade");
    xat.style.opacity = 1;
    music.classList.add("show");

    audio.volume = 0.6;   // 🎚 volumen inicial (opcional)
    audio.play();         // ▶️ AUTOPLAY REAL
    playBtn.textContent = '⏸';

  },900);

  setTimeout(()=>{
    overlay.remove();
  },1500);
});


const tracks = [
  { title:'CONTIGO', artist:'Maki, María Artés ', src:'music/Maki, María Artés - CONTIGO.mp3' },
  { title:'Amanece', artist:'Anuel AA', src:'music/Anuel AA - Amanece.mp3' },
  { title:'Más Que Ayer', artist:'Arcangel y De La Ghetto', src:'music/Arcangel y De La Ghetto - Más Que Ayer.mp3' }
];


let current = 0;
const audio = document.getElementById('audio');
const title = document.querySelector('.music-info .title');
const artist = document.querySelector('.music-info .artist');
const playBtn = document.getElementById('musicPlay');


function loadTrack(){
audio.src = tracks[current].src;
title.textContent = tracks[current].title;
artist.textContent = tracks[current].artist;
}
audio.addEventListener('ended', nextTrack);


function togglePlay(){
if(audio.paused){
audio.play();
playBtn.textContent = '⏸';
}else{
audio.pause();
playBtn.textContent = '▶';
}
}


function nextTrack(){
current = (current + 1) % tracks.length;
loadTrack();
audio.play();
}


function prevTrack(){
current = (current - 1 + tracks.length) % tracks.length;
loadTrack();
audio.play();
}


loadTrack();

/* =========================
   EFECTO ESCRITURA
========================= */

const frase = "En la orilla del mar empezará un nuevo laberinto de amor, donde nos perderemos sin definir nuestro destino. Regocijo de mi alma, peoma viviente que recorre de mis labios, taslismán brillante de mispensamientos, fortaleza intrínseca que lucha con las horas, latido de fe y razón de mi sistema límbico";
let letra = 0;
const velocidad = 70;

function escribirFrase(){
  if(letra < frase.length){
    document.getElementById("typingText").textContent += frase.charAt(letra);
    letra++;
    setTimeout(escribirFrase, velocidad);
  }
}

/* Reinicia al entrar a SOBRE MI */
document
  .querySelector("button[onclick=\"showSection('sobremi')\"]")
  .addEventListener("click", () => {
    const texto = document.getElementById("typingText");
    texto.textContent = "";
    letra = 0;
    setTimeout(escribirFrase, 300);
  });

/* =========================
   MARRIED MODAL
========================= */

const marriedModal = document.getElementById("marriedModal");
const marriedText = "Mi lugar favorito es donde estás tú.";
let marriedIndex = 0;

function openMarried(){
  marriedModal.classList.add("active");
  marriedIndex = 0;
  document.getElementById("marriedTyping").textContent = "";
  setTimeout(typeMarried, 400);
}

function closeMarried(){
  marriedModal.classList.remove("active");
}

/* Escritura */
function typeMarried(){
  if(marriedIndex < marriedText.length){
    document.getElementById("marriedTyping")
      .textContent += marriedText.charAt(marriedIndex);
    marriedIndex++;
    setTimeout(typeMarried, 70);
  }
}

const navMarried = document.getElementById("navMarried");

navMarried.addEventListener("click", () => {
  openMarried();
});


/* =========================
   GALLERY – DRAG MOUSE
========================= */

const track = document.getElementById("galleryTrack");

let isDown = false;
let startX;
let currentTranslate = 0;
let prevTranslate = 0;

track.addEventListener("mousedown", (e) => {
  isDown = true;
  startX = e.pageX;
  track.style.transition = "none";
});

window.addEventListener("mouseup", () => {
  isDown = false;
  prevTranslate = currentTranslate;
  track.style.transition = "transform .5s cubic-bezier(.22,1,.36,1)";
});

window.addEventListener("mousemove", (e) => {
  if(!isDown) return;

  const delta = e.pageX - startX;
  currentTranslate = prevTranslate + delta;

  track.style.transform = `translateX(${currentTranslate}px)`;
});

/* Evita seleccionar imágenes */
track.addEventListener("dragstart", e => e.preventDefault());



const cursor = document.getElementById("cursor");

let mouseX = 0, mouseY = 0;
let currentX = 0, currentY = 0;

document.addEventListener("mousemove", e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  const trail = document.createElement("div");
  trail.className = "trail";
  trail.style.left = mouseX + "px";
  trail.style.top = mouseY + "px";
  document.body.appendChild(trail);
  setTimeout(() => trail.remove(), 600);
});

document.addEventListener("click", e => {
  const ripple = document.createElement("div");
  ripple.className = "ripple";
  ripple.style.left = e.clientX + "px";
  ripple.style.top = e.clientY + "px";
  document.body.appendChild(ripple);
  setTimeout(() => ripple.remove(), 600);
});

function animate() {
  currentX += (mouseX - currentX) * 0.15;
  currentY += (mouseY - currentY) * 0.15;

  cursor.style.left = currentX + "px";
  cursor.style.top = currentY + "px";

  requestAnimationFrame(animate);
}
animate();


</script>
