<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Profissional WRS</title>
    <style>
        :root {
            --neon-blue: #0048FF;
            --bg-dark: #050505;
            --card-bg: #111;
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PERFIL */
        .perfil-header {
            text-align: center;
            padding: 30px;
            border-bottom: 2px solid var(--neon-blue);
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
        }

        .perfil-header h1 {
            font-size: 3rem;
            margin: 0;
            color: var(--neon-blue);
            text-shadow: 0 0 20px var(--neon-blue);
        }

        /* NAVEGAÇÃO */
        .nav-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .nav-btn {
            background: #1a1a1a;
            color: #888;
            border: 1px solid #333;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            transition: 0.3s;
        }

        .nav-btn:hover, .nav-btn.active {
            border-color: var(--neon-blue);
            color: white;
            background: #001240;
            box-shadow: 0 0 15px rgba(0, 72, 255, 0.5);
        }

        /* SEÇÕES */
        .section {
            display: none;
            width: 100%;
            max-width: 1200px;
        }

        .section.active { display: block; }

        /* BARRAS DE TÍTULO COM GRADIENTE ANIMADO */
        .marquee-tag {
            background: linear-gradient(-45deg, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 400% 400%;
            animation: gradientAnim 5s ease infinite;
            color: #000 !important;
            padding: 10px;
            margin: 25px 0 15px 0;
            font-weight: bold;
            display: block;
            width: 100%;
            overflow: hidden;
            white-space: nowrap;
        }

        @keyframes gradientAnim {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* GRIDS E CARDS */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .grid-largo {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            transition: 0.3s;
            text-align: center;
        }

        .card:hover {
            border-color: var(--neon-blue);
            transform: scale(1.04);
        }

        .card img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .card .label {
            padding: 10px;
            font-size: 11px;
            color: #aaa;
            background: #0a0a0a;
        }

        marquee {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="perfil-header">
        <h1>GABRIEL GALLERY</h1>
        <p>Propriedade de Gabr (1777777)</p>
    </div>

    <div class="nav-container">
        <button class="nav-btn active" onclick="showTab('gifs')">GIFS</button>
        <button class="nav-btn" onclick="showTab('pcback-gif')">PCBACK GIFS</button>
        <button class="nav-btn" onclick="showTab('pstyle-gif')">PSTYLE GIFS</button>
        <button class="nav-btn" onclick="showTab('pcback-est')">PCBACK ESTÁTICO</button>
        <button class="nav-btn" onclick="showTab('pstyle-est')">PSTYLE ESTÁTICO</button>

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');

</body>
