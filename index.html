<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer"> <title>Xatspace Pixel Perfect</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at top, #0f0c29, #09061a 70%);
            overflow: hidden;
        }

        .wrapper {
            display: flex;
            align-items: center;
            gap: 40px;
            position: relative;
            left: 50px; /* Ajustado para melhor centralização */
        }

        /* PERFIL */
        .profile {
            position: relative;
            width: 390px;
            height: 400px;
            padding: 180px 10px 30px;
            border-radius: 25px;
            background: rgba(93, 193, 185, 0.6);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(21, 126, 139, 0.2);
            box-shadow: 0 30px 60px rgba(0,0,0,0.7);
            color: #fff;
        }

        /* AVATAR */
        .avatar {
            position: absolute;
            top: -45px;
            left: -178px;
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: rgba(93, 193, 185, 0.6);
            backdrop-filter: blur(25px);
            overflow: hidden;
            border: 15px solid #358a8da1;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
            z-index: 20;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }

        /* MENU */
        .menu {
            position: absolute;
            top: -45px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 8px;
            background: rgba(93, 193, 185, 0.6);
            backdrop-filter: blur(15px);
            padding: 6px;
            border-radius: 26px;
            border: 1px solid rgba(112, 255, 255, 0.1);
            z-index: 30;
        }
        .menu span {
            font-size: 12px;
            opacity: 0.7;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .menu span:hover { background: rgba(117, 182, 202, 0.6); opacity: 1; }
        .menu .active {
            background: linear-gradient(90deg, #46efd3, #2eb8a5);
            opacity: 1;
            box-shadow: 0 5px 15px rgba(51, 234, 204, 0.5);
        }

        /* TABS - Adicionado scroll para mobile */
        .tabs {
            position: relative;
            top: -70px;
            height: 250px;
            overflow-y: auto;
            scrollbar-width: none; /* Firefox */
        }
        .tabs::-webkit-scrollbar { display: none; } /* Chrome/Safari */

        .tab { display: none; width: 100%; animation: fade 0.5s ease; }
        .tab.active { display: block; }

        @keyframes fade {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .name { text-align: center; font-size: 30px; background: linear-gradient(90deg, #46efca, #16e2d8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-weight: 600; }
        .id { font-size: 12px; text-align: center; opacity: 0.6; margin-bottom: 15px; }

        .info { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
        .card {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 12px;
            border-radius: 12px;
            min-width: 100px;
            text-align: center;
        }
        .card .title { display: block; font-size: 10px; color: #84fcd8; font-weight: 600; }
        .card .sub { font-size: 10px; opacity: 0.9; }

        .message {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
            text-align: center;
            font-size: 11px;
            min-height: 50px;
        }

        /* PLAYER */
        .player {
            position: relative;
            width: 170px;
            padding: 15px;
            border-radius: 80px 80px 30px 30px;
            background: rgba(49, 126, 133, 0.6);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(112, 226, 255, 0.1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.5);
            text-align: center;
            margin-left: -20px;
        }
        .player img {
            width: 80px; height: 80px;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid #2d8b8b;
            animation: spin 6s linear infinite;
            animation-play-state: paused;
        }
        .player.playing img { animation-play-state: running; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .song { font-size: 10px; margin: 10px 0; }
        .controls { display: flex; justify-content: center; gap: 10px; margin-bottom: 10px; }
        .controls button {
            width: 35px; height: 35px;
            border: none; border-radius: 50%;
            background: rgba(255,255,255,0.1);
            color: #fff; cursor: pointer;
            transition: 0.3s;
        }
        .controls button:hover { background: #46efd3; }

        .progress-container { width: 100%; height: 4px; background: rgba(255,255,255,0.1); border-radius: 10px; cursor: pointer; }
        .progress { height: 100%; width: 0%; background: #46efd3; box-shadow: 0 0 8px #46efd3; }

        /* FRIENDS GRID */
        .friends { display: grid; grid-template-columns: 1fr; gap: 10px; padding: 10px; }
        .friend {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.05);
            padding: 10px; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .avatar-friend { width: 40px; height: 40px; border-radius: 50%; background: #317c88; display: flex; align-items: center; justify-content: center; font-weight: bold; overflow: hidden; }
        .avatar-friend img { width: 100%; height: 100%; object-fit: cover; }
        .nick { font-size: 10px; font-weight: 600; }
        .xat { margin-left: auto; font-size: 9px; color: #46efd3; text-decoration: none; border: 1px solid #46efd3; padding: 4px 8px; border-radius: 10px; }

        /* GALERIA */
        .gallery-container { height: 200px; display: flex; justify-content: center; align-items: center; perspective: 1000px; }
        .card-main { width: 120px; height: 160px; border-radius: 15px; overflow: hidden; border: 2px solid rgba(70, 239, 211, 0.5); cursor: pointer; transition: 0.5s; }
        .card-main img { width: 100%; height: 100%; object-fit: cover; }
        .carousel { display: none; position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }
        .item { position: absolute; width: 80px; height: 110px; left: 50%; top: 50%; transform: translate(-50%, -50%); border-radius: 10px; overflow: hidden; border: 1px solid #46efd3; transition: 1s; }
        .item img { width: 100%; height: 100%; object-fit: cover; }
        .carousel.active { animation: rotate 20s linear infinite; }
        @keyframes rotate { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        /* INTRO */
        .intro { position: fixed; inset: 0; background: #09061a; display: flex; justify-content: center; align-items: center; z-index: 9999; transition: 1s; }
        .intro.hide { opacity: 0; pointer-events: none; }
        .enter-btn { padding: 15px 40px; border: none; border-radius: 30px; background: #46efd3; color: #000; font-weight: bold; cursor: pointer; box-shadow: 0 0 20px #46efd3; }

        .butterfly { position: absolute; top: -50px; left: -150px; width: 100px; z-index: 25; pointer-events: none; animation: float 4s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translate(0,0); } 50% { transform: translate(15px, -15px); } }
    </style>
</head>
<body>

<div class="intro" id="intro">
    <button class="enter-btn" id="enterBtn">ENTRAR</button>
</div> 

<video autoplay muted loop id="bg-video">
    <source src="https://i.imgur.com/WASzslt.mp4" type="video/mp4">
</video>

<div class="wrapper">
    <div class="butterfly"><img src="https://i.imgur.com/dVLIvmG.gif" width="100"></div>

    <div class="profile">
        <div class="avatar"><img src="https://i.imgur.com/MXo7l6I.jpeg"></div>
        <div class="menu">
            <span class="active" onclick="showTab('perfil')">PERFIL</span>
            <span onclick="showTab('amigos')">AMIGOS</span>
            <span onclick="showTab('galeria')">GALERIA</span>
        </div>

        <div class="tabs">
            <div class="tab active" id="perfil">
                <div class="name">Gabriel</div>
                <div class="id">ID: 1777777</div>
                <div class="info">
                    <div class="card"><span class="title">Aniversário</span><span class="sub">21 de Outubro</span></div>
                    <div class="card"><span class="title">Signo</span><span class="sub">Libra</span></div>
                    <div class="card"><span class="title">País</span><span class="sub"><img src="https://flagcdn.com/w20/br.png" width="15"> BR</span></div>
                </div>
                <div class="message"><span id="typing"></span></div>
            </div>

            <div class="tab" id="amigos">
                <div class="friends">
                    <div class="friend">
                        <div class="avatar-friend">M</div>
                        <div class="data"><div class="nick">Mnna</div></div>
                        <a href="https://xat.me/1013" class="xat" target="_blank">Perfil</a>
                    </div>
                    </div>
            </div>

            <div class="tab" id="galeria">
                <div class="gallery-container">
                    <div class="card-main" id="mainCard"><img src="https://xatimg.com/image/8z7cf8Mv481B.jpg"></div>
                    <div class="carousel" id="carousel">
                        <div class="item"><img src="https://xatimg.com/image/odqAC8JYnYJu.jpg"></div>
                        <div class="item"><img src="https://xatimg.com/image/odqAC8JYnYJu.jpg"></div>
                        <div class="item"><img src="https://xatimg.com/image/odqAC8JYnYJu.jpg"></div>
                        <div class="item"><img src="https://xatimg.com/image/odqAC8JYnYJu.jpg"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="player">
        <img id="cover" src="https://xatimg.com/image/rUIx7552IVWI.jpg">
        <div class="song"><b id="artist">Artista</b><br><span id="title">Carregando...</span></div>
        <div class="controls">
            <button onclick="prev()">⏮</button>
            <button onclick="togglePlay()" id="playBtn">▶</button>
            <button onclick="next()">⏭</button>
        </div>
        <div class="progress-container" onclick="setProgress(event)"><div class="progress" id="progress"></div></div>
        <audio id="audio"></audio>
    </div>
</div>

<script>
    const audio = document.getElementById("audio");
    const playBtn = document.getElementById("playBtn");
    const player = document.querySelector(".player");
    const intro = document.getElementById("intro");

    const songs = [
        {
            name: "Carlos Rivera - Que lo nuestro se quede nuestro.mp3",
            title: "Que lo nosso se quede nosso",
            artist: "Carlos Rivera",
            cover: "https://xatimg.com/image/rUIx7552IVWI.jpg",
            url: "SUA_URL_DO_DROPBOX_AQUI" // Coloque o link direto aqui
        }
    ];

    let index = 0;
    let playing = false;

    function loadSong(song) {
        audio.src = song.url || "music/" + song.name;
        document.getElementById("cover").src = song.cover;
        document.getElementById("title").innerText = song.title;
        document.getElementById("artist").innerText = song.artist;
    }

    function togglePlay() {
        if (playing) { audio.pause(); playBtn.innerText = "▶"; player.classList.remove("playing"); }
        else { audio.play(); playBtn.innerText = "⏸"; player.classList.add("playing"); }
        playing = !playing;
    }

    function next() { index = (index + 1) % songs.length; loadSong(songs[index]); audio.play(); }
    function prev() { index = (index - 1 + songs.length) % songs.length; loadSong(songs[index]); audio.play(); }

    audio.ontimeupdate = () => {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById("progress").style.width = pct + "%";
    };

    function setProgress(e) {
        audio.currentTime = (e.offsetX / e.currentTarget.clientWidth) * audio.duration;
    }

    // Tabs
    function showTab(id) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.menu span').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');
    }

    // Typing
    const text = "Não tenho medo de ser quem sou. Afinal, para que me esconder?";
    let charIdx = 0;
    function type() {
        if (charIdx < text.length) {
            document.getElementById("typing").innerHTML += text.charAt(charIdx);
            charIdx++;
            setTimeout(type, 50);
        }
    }

    // Enter
    document.getElementById("enterBtn").onclick = () => {
        intro.classList.add("hide");
        loadSong(songs[0]);
        type();
    };

    // Galeria
    document.getElementById("mainCard").onclick = function() {
        this.style.display = "none";
        const carousel = document.getElementById("carousel");
        carousel.style.display = "block";
        const items = document.querySelectorAll(".item");
        items.forEach((item, i) => {
            const angle = (360 / items.length) * i;
            item.style.transform = `translate(-50%, -50%) rotateY(${angle}deg) translateZ(150px)`;
        });
        setTimeout(() => carousel.classList.add("active"), 1000);
    };

    // Proteção
    document.addEventListener('contextmenu', e => e.preventDefault());
    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === 'u' || e.key === 's')) e.preventDefault();
    });
</script>

</body>
</html>
