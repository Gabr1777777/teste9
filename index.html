<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Profissional WRS</title>
    <style>
        :root {
            --neon-blue: #0048FF;
            --bg-dark: #050505;
            --card-bg: #111;
            --deep-blue-bar: #000a1f; 
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PERFIL */
        .perfil-header {
            text-align: center;
            padding: 30px;
            border-bottom: 2px solid var(--neon-blue);
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
        }

        .perfil-header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(-45deg, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 4s linear infinite;
        }

        .perfil-header p {
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(-45deg, #ffffff, #000000, #ffffff, #000000);
            background-size: 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 5s linear infinite;
        }

        /* NAVEGAÇÃO E BOTÕES */
        .nav-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
            position: sticky;
            top: 10px;
            z-index: 100;
        }

        .nav-btn {
            background: var(--deep-blue-bar);
            border: 1px solid #00268a;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 11px;
            transition: 0.3s;
        }

        .nav-btn span {
            background: linear-gradient(to right, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 3s linear infinite;
        }

        /* BARRAS DE TÍTULO (LETREIRO RIGOROSO) */
        .marquee-tag {
            background: var(--deep-blue-bar);
            padding: 10px 0;
            margin: 25px 0 15px 0;
            border: 1px solid #00268a;
            width: 100%;
            overflow: hidden;
        }

        /* Estilo do texto dentro do marquee */
        .texto-animado {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 16px;
            background: linear-gradient(to right, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 3s linear infinite;
            padding-right: 50px; /* Espaço para não colar no reinício */
        }

        @keyframes moveGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* GRIDS E CARDS */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .grid-largo {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
            text-align: center;
        }

        .card img {
            width: 100%;
            display: block;
            object-fit: cover;
        }

        .card .label {
            padding: 10px;
            font-size: 11px;
            color: #aaa;
            background: #0a0a0a;
        }

        .section { display: none; width: 100%; max-width: 1200px; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <div class="perfil-header">
        <h1>GABRIEL GALLERY</h1>
        <p>Propriedade de Gabr (1777777)</p>
    </div>

    <div class="nav-container">
        <button class="nav-btn active" onclick="showTab('inicio')"><span>Início</span></button>
        <button class="nav-btn" onclick="showTab('gifs')"><span>GIFS</span></button>
        <button class="nav-btn" onclick="showTab('pcback-gif')"><span>PCBACK GIFS</span></button>
        <button class="nav-btn" onclick="showTab('pstyle-gif')"><span>PSTYLE GIFS</span></button>
        <button class="nav-btn" onclick="showTab('pcback-est')"><span>PCBACK ESTÁTICO</span></button>
        <button class="nav-btn" onclick="showTab('pstyle-est')"><span>PSTYLE ESTÁTICO</span></button>
        <button class="nav-btn" onclick="showTab('fundos')"><span>FUNDOS</span></button>

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(event) event.currentTarget.classList.add('active');
        }

        function render() {
            const gifContainer = document.getElementById('content-gifs');
            dataGifs.forEach(sec => {
                // scrollamount="4" (lento), scrolldelay="0" (sem pausa), loop="infinite"

                <div class="marquee-tag">
                    <marquee behavior="scroll" direction="left" scrollamount="4" scrolldelay="0" loop="infinite">

                sec.ids.forEach((id, i) => { 
                    html += `<div class="card"><img src="https://i.imgur.com/${id}.gif"><div class="label">${sec.prefix}${i+1}</div></div>`;

        window.onload = render;

</body>
