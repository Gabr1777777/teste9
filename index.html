<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Profissional WRS</title>
    <style>
        :root {
            --neon-blue: #0048FF;
            --bg-dark: #050505;
            --card-bg: #111;
            --deep-blue-bar: #000a1f; 
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PERFIL */
        .perfil-header {
            text-align: center;
            padding: 30px;
            border-bottom: 2px solid var(--neon-blue);
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
        }

        .perfil-header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(-45deg, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 4s linear infinite;
        }

        .perfil-header p {
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(-45deg, #ffffff, #000000, #ffffff, #000000);
            background-size: 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 5s linear infinite;
        }

        /* NAVEGAÇÃO */
        .nav-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .nav-btn {
            background: var(--deep-blue-bar);
            border: 1px solid #00268a;
            padding: 14px 24px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 13px;
            transition: 0.3s;
        }

        .nav-btn:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            transform: translateY(-2px);
        }

        .nav-btn span {
            background: linear-gradient(to right, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 3s linear infinite;
        }

        /* LETREIRO INFINITO CSS */
        .marquee-container {
            background: var(--deep-blue-bar);
            border: 1px solid #00268a;
            width: 100%;
            overflow: hidden;
            margin: 25px 0 15px 0;
            padding: 12px 0;
            white-space: nowrap;
        }

        .marquee-content {
            display: inline-block;
            animation: linear-scroll 15s linear infinite;
        }

        .texto-animado {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 16px;
            background: linear-gradient(to right, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 3s linear infinite;
            padding-right: 100px;
        }

        @keyframes linear-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes moveGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* GRIDS */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .grid-largo {
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        }

        /* GRID ESPECÍFICO PARA GIFS (7 por linha) */
        .grid-gifs {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
        }

        /* GRID ESPECÍFICO PARA PSTYLE (Ajustado para 4 por linha) */
        .grid-pstyle {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 4px;
            overflow: hidden;
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            border-color: var(--neon-blue);
            box-shadow: 0 0 20px var(--neon-blue);
            transform: scale(1.03);
            z-index: 10;
        }

        .card img { width: 100%; display: block; object-fit: cover; }

        #content-gifs .card { width: 140px; margin: auto; }
        #content-gifs .card img { width: 140px; height: 140px; }

        .card .label { 
            padding: 8px 5px; 
            font-size: 11px;
            color: #ffffff;
            font-weight: bold;
            background: #0a0a0a; 
            text-transform: uppercase;
        }

        .section { display: none; width: 100%; max-width: 1200px; }
        .section.active { display: block; }
    </style>
</head>
<body>
