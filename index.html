<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria Profissional WRS</title>
    <style>
        :root {
            --neon-blue: #0048FF;
            --bg-dark: #050505;
            --card-bg: #111;
            --deep-blue-bar: #000a1f; 
        }

        body {
            background-color: var(--bg-dark);
            color: white;
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* PERFIL */
        .perfil-header {
            text-align: center;
            padding: 30px;
            border-bottom: 2px solid var(--neon-blue);
            width: 100%;
            max-width: 1000px;
            margin-bottom: 30px;
        }

        .perfil-header h1 {
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(-45deg, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 4s linear infinite;
        }

        .propriedade-txt {
            font-weight: bold;
            text-transform: uppercase;
            background: linear-gradient(-45deg, #ffffff, #0048FF, #ffffff, #0048FF);
            background-size: 300%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 5s linear infinite;
        }

        /* NAVEGAÇÃO */
        .nav-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 40px;
        }

        .nav-btn {
            background: var(--deep-blue-bar);
            border: 2px solid #00268a;
            padding: 12px 22px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 12px;
            transition: all 0.3s ease-in-out;
        }

        .nav-btn span {
            background: linear-gradient(to right, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 3s linear infinite;
        }

        .nav-btn:hover, .card:hover {
            box-shadow: 0 0 20px var(--neon-blue);
            border-color: #ffffff;
        }

        /* LETREIRO INFINITO */
        .marquee-container {
            background: var(--deep-blue-bar);
            border: 1px solid #00268a;
            width: 100%;
            overflow: hidden;
            margin: 25px 0 15px 0;
            padding: 12px 0;
            white-space: nowrap;
        }

        .marquee-content {
            display: inline-block;
            animation: linear-scroll 20s linear infinite;
        }

        .texto-animado {
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 16px;
            background: linear-gradient(to right, #0048FF, #ffffff, #0048FF, #ffffff);
            background-size: 200% auto;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: moveGradient 3s linear infinite;
            padding-right: 150px;
        }

        @keyframes linear-scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        @keyframes moveGradient {
            0% { background-position: 0% center; }
            100% { background-position: 200% center; }
        }

        /* GRID RIGOROSO: 7 POR LINHA ALINHADO À ESQUERDA */
        .grid-gifs {
            display: grid;
            grid-template-columns: repeat(7, 80px); /* 7 Colunas fixas de 80px */
            gap: 15px;
            width: 100%;
            justify-content: start; /* Alinha um do lado do outro desde o início */
            margin-bottom: 30px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid #222;
            border-radius: 4px;
            overflow: hidden;
            transition: 0.3s;
            cursor: pointer;
            text-align: center;
        }

        /* GIFS: RIGOROSAMENTE 80x80 */
        #content-gifs .card { width: 80px; height: auto; }
        #content-gifs .card img { width: 80px; height: 80px; object-fit: cover; }
        
        .card img { width: 100%; display: block; }

        .card .label { 
            padding: 5px; 
            font-size: 9px; 
            color: #ffffff; 
            font-weight: bold; 
            background: #000; 
            white-space: nowrap;
            overflow: hidden;
        }

        .section { display: none; width: 100%; max-width: 1200px; }
        .section.active { display: block; }
    </style>
</head>
<body>

    <div class="perfil-header">
        <h1>GABRIEL GALLERY</h1>
        <p class="propriedade-txt">Propriedade de Gabr (1777777)</p>
    </div>

    <div class="nav-container">
        <button class="nav-btn" onclick="showTab('inicio')"><span>Início</span></button>
        <button class="nav-btn" onclick="showTab('gifs')"><span>GIFS</span></button>
        <button class="nav-btn" onclick="showTab('pcback-gif')"><span>PCBACK GIFS</span></button>
        <button class="nav-btn" onclick="showTab('pstyle-gif')"><span>PSTYLE GIFS</span></button>
        <button class="nav-btn" onclick="showTab('pcback-est')"><span>PCBACK ESTÁTICO</span></button>
        <button class="nav-btn" onclick="showTab('pstyle-est')"><span>PSTYLE ESTÁTICO</span></button>
        <button class="nav-btn" onclick="showTab('fundos')"><span>FUNDOS</span></button>
        <button class="nav-btn" onclick="showTab('xatspace')"><span>XATSPACE</span></button>
    </div>

    <div id="inicio" class="section active"><h2 style="text-align:center">Galeria WRS</h2></div>
    <div id="gifs" class="section"><div id="content-gifs"></div></div>
    <div id="pcback-gif" class="section"><div class="grid-container" id="content-pcback-gif"></div></div>
    <div id="pstyle-gif" class="section"><div class="grid-container" id="content-pstyle-gif"></div></div>
    <div id="pcback-est" class="section"><div class="grid-container" id="content-pcback-est"></div></div>
    <div id="pstyle-est" class="section"><div class="grid-container" id="content-pstyle-est"></div></div>
    <div id="fundos" class="section"><div class="grid-container" id="content-fundos"></div></div>

            { marquee: "Blufftitler - Nome + Photo - 350 Xats", prefix: "Bluff - ", ids: ["F0b4mnJ", "65bzz5V", "ZetkVFF", "JqzxOwt", "NK9Z8rU", "RNIlFI3", "bSmUjsQ", "R6klF5K", "cgyGLHQ", "ctF1vyH", "Ge90Xy7", "7Z8xEC8", "G8HFkiG", "sh7u3UM", "y0WgmxJ", "Vvw2SMU", "uoNJlEe"] },

            { marquee: "AfterEffects - Name + Photo - 400 Xats", prefix: "After - ", ids: ["S5pXaVI", "qQB5w4C", "QlniJvg", "shyBpPS", "LzTvWk4", "aLBEkKq", "kJmAoul", "uOwOmwM", "u0Cse5Q", "ioDaClP", "PD03EYd", "HVFwoO9", "ueBRxvV", "XkwoKCf", "ULcq67R", "afxBCK8", "NKjJIGs", "xDhKvCC", "vvcOaEK", "ups9FgX", "JeY6A7M", "zDyoEgZ", "0FklDw9", "FX6gdFw", "V3LO0YG", "r9yfJNZ", "R3sO6Dv", "P8DpN4L", "fRfZuO7", "BPgPihm", "5HxfNaB", "FILAVQP", "5IoR515", "KUQ1WsX", "ZuaO9n5", "eYUpRds", "EkhA4lw", "ufOP9QG", "w2URYst", "1uMiE0k", "JQaMJ7U", "JeVcLkk", "un368jG", "LaClQL2", "l3Az3Nz", "8ME12WB", "SWSOcvf", "HizA7mV", "HnIaNDX", "POgiaNY", "CgwrMHf", "MtDrchh", "P4UINMY", "F0ujERT", "lHdM40L", "vWKX5Fb", "UHq0679", "2tRaU1S", "XQJ8R9h", "n4sAIhn", "LaJAK5L", "RIDkkSc", "ogHzac1", "aV63fjn", "tSuJOKg", "MxeKAfQ", "A4chzU3", "bAXpFow", "1YlDoNZ", "IXCqwlR", "kv1EWDW", "FIulKIF", "qLhMZAE", "R9nl6Ch", "uCXDGTg"] },

        function showTab(id) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function render() {
            const containers = {
                'gifs': document.getElementById('content-gifs'),
                'pcback-gif': document.getElementById('content-pcback-gif'),
                'pstyle-gif': document.getElementById('content-pstyle-gif'),
                'pcback-est': document.getElementById('content-pcback-est'),
                'pstyle-est': document.getElementById('content-pstyle-est'),
                'fundos': document.getElementById('content-fundos')
            };

            dataGifs.forEach(sec => {
                let html = `<div class="marquee-container"><div class="marquee-content"><span class="texto-animado">${sec.marquee}</span><span class="texto-animado">${sec.marquee}</span></div></div><div class="grid-gifs">`;

                    const url = `https://i.imgur.com/${id}.gif`;
                    html += `<div class="card" onclick="window.open('${url}','_blank')"><img src="${url}"><div class="label">${sec.prefix}${i+1}</div></div>`;
                });
                html += `</div>`; containers['gifs'].innerHTML += html;
            });

            const fill = (id, img, label, count) => {
                for(let i=1; i<=count; i++) {
                    containers[id].innerHTML += `<div class="card" onclick="window.open('${img}','_blank')"><img src="${img}"><div class="label">${label} #${i}</div></div>`;
                }
            };

            fill('pcback-gif', 'https://i.imgur.com/SFnk7A6.gif', 'PCBack Gif', 16);
            fill('pstyle-gif', 'https://i.imgur.com/rUIzfWU.gif', 'PStyle Gif', 16);
            fill('pcback-est', 'https://i.imgur.com/OyX4Jwt.png', 'Wallpaper', 12);
            fill('pstyle-est', 'https://i.imgur.com/zlcL7Dh.png', 'PStyle Fix', 10);
            fill('fundos', 'https://i.imgur.com/eJtGG3D.png', 'Fundo', 12);
        }
        window.onload = render;
    </script>
</body>
</html>
