<!DOCTYPE html>
<html>
<head>
<style>
html, body {
  margin: 0;
  padding: 0;
  overflow: hidden;
  background: black;
}

/* VIDEO DE FONDO */
#bgvideo {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  z-index: -1;
}

/* CONTENIDO ENCIMA (opcional) */
.content {
  position: relative;
  z-index: 1;
  color: white;
  text-align: center;
  top: 40%;
  font-family: Arial, sans-serif;
  font-size: 30px;
  text-shadow: 2px 2px 10px black;
}
</style>
</head>

<body>

<video id="bgvideo" autoplay loop muted>
  <source src="https://i.imgur.com/9ZlOLDf.mp4" type="video/mp4">
</video>



</body>
</html>
