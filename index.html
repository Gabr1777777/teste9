<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XatSpace • HUD Futurista Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#140505;
  --cyan:#ff0000;
  --orange:#ff1a1a;
  --text:#ffeaea;
  --muted:#c98f8f;
  --glass:rgba(45, 10, 10, 0.55);
}

*{box-sizing:border-box}

body{
  margin:0;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  background:
    radial-gradient(900px 500px at 20% 10%, #380f0f, transparent),
    radial-gradient(800px 500px at 80% 90%, #2e0f0f, transparent),
    var(--bg);
  font-family:Inter,system-ui,sans-serif;
  color:var(--text);
}

/* ================= HUD ================= */
.hud{
  width:880px;
  height:420px;
  display:grid;
  grid-template-columns:1fr 260px;
  background:linear-gradient(180deg, rgba(40, 10, 10, 0.9), rgba(25, 5, 5, 0.95));
  clip-path:polygon(0 0,94% 0,100% 8%,100% 92%,96% 100%,8% 100%,0 92%);
  border:2px solid var(--cyan);
  box-shadow:0 0 35px rgba(255, 0, 0, 0.35);
  overflow:hidden;
  position:relative;
}

.hud::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.03) 0 1px, transparent 1px 6px),
    linear-gradient(90deg, transparent, rgba(255, 0, 0, 0.18), transparent);
  opacity:.25;
  pointer-events:none;
}

/* ================= LEFT ================= */
.content{
  padding:26px 30px;
}

.hud-line{
  height:3px;
  margin-bottom:22px;
  background:linear-gradient(90deg,var(--orange),var(--cyan),transparent);
  box-shadow:0 0 18px rgba(255, 0, 0, 0.55);
}

.panel{
  display:none;
  opacity:0;
  transform:translateY(10px);
}

.panel.active{
  display:block;
  opacity:1;
  transform:translateY(0);
  animation:panelFade .35s ease;
}

@keyframes panelFade{
  from{
    opacity:0;
    transform:translateY(10px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}


.signature{
  font-family:Orbitron,sans-serif;
  font-size:1.4rem;
  letter-spacing:2px;
  color:var(--cyan);
  text-shadow:0 0 18px rgba(255, 0, 0, 0.6);
}

/* ================= GALLERY ================= */
.gallery{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:12px;
}
.gallery div{
  height:90px;
  background:#300b0b;
  border:1px solid rgba(255, 0, 0, 0.25);
}

/* ================= FRIENDS ================= */
.friends-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:16px;
}

.friend-card{
  position:relative;
  padding:16px;
  background:var(--glass);
  backdrop-filter:blur(14px);
  border:1px solid rgba(255, 0, 0, 0.35);
  clip-path:polygon(0 0,92% 0,100% 18%,100% 100%,0 100%);
  box-shadow:0 0 18px rgba(255, 0, 0, 0.25);
  transition:.35s ease;
  overflow:hidden;
}

.friend-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(120deg,transparent 30%,rgba(255, 0, 0, 0.5),rgba(255, 0, 0, 0.5),transparent 70%);
  opacity:0;
  filter:blur(6px);
  transition:.4s;
}

.friend-card::after{
  content:"";
  position:absolute;
  inset:-150%;
  background:linear-gradient(120deg,transparent 45%,rgba(255, 26, 26, 0.25),transparent 55%);
  transform:rotate(15deg);
  opacity:0;
}

.friend-card:hover{
  transform:translateY(-6px) scale(1.02);
  border-color:var(--orange);
  box-shadow:0 0 35px rgba(255, 26, 26, 0.35);
}

.friend-card:hover::before{opacity:1}
.friend-card:hover::after{
  opacity:1;
  animation:scan 1.2s linear forwards;
}

.friend-name{
  font-family:Orbitron,sans-serif;
  letter-spacing:2px;
  color:var(--cyan);
  margin-bottom:6px;
}

.friend-id{
  font-size:.8rem;
  color:var(--muted);
  margin-bottom:8px;
}

.friend-link{
  font-size:.85rem;
  color:var(--text);
  text-decoration:none;
  border-bottom:1px solid rgba(0,234,255,.4);
}

.friend-card:hover .friend-name{
  text-shadow:0 0 12px rgba(0,234,255,.8);
}
.friend-card:hover .friend-link{
  color:var(--orange);
  border-color:var(--orange);
}

@keyframes scan{
  from{transform:translate(-30%,-30%) rotate(15deg)}
  to{transform:translate(30%,30%) rotate(15deg)}
}

/* ================= RIGHT ================= */
.profile{
  border-left:2px solid rgba(255, 0, 0, 0.4);
  padding:22px;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.avatar{
  width:96px;
  height:96px;
  background:linear-gradient(135deg,var(--cyan),var(--orange));
  padding:2px;
  margin-bottom:14px;
}
.avatar img{width:100%;height:100%;object-fit:cover;background:#000}

.username{
  font-family:Orbitron,sans-serif;
  color:var(--cyan);
  letter-spacing:2px;
}
.userid{
  font-size:.8rem;
  color:var(--muted);
  margin-bottom:18px;
}

.profile button{
  width:100%;
  margin-bottom:10px;
  background:linear-gradient(180deg,#3f0e0e,#250707);
  border:1px solid rgba(255, 0, 0, 0.35);
  color:var(--text);
  font-family:Orbitron,sans-serif;
  cursor:pointer;
}
.profile button:hover{color:var(--orange);border-color:var(--orange)}

/* ================= PLAYER ================= */
.player{
  margin-top:auto;
  width:100%;
  padding:14px;
  text-align:center;
  border:1px solid rgba(255, 0, 0, 0.35);
}
.controls{
  display:flex;
  justify-content:center;
  gap:10px;
}
.controls button{
  width:36px;
  height:36px;
  border-radius:50%;
  background:none;
  border:1px solid rgba(255, 0, 0, 0.4);
  color:var(--text);
  cursor:pointer;
}
audio{display:none}


.gallery-frame{
  width:100%;
  height:300px;
  border:none;
  background:transparent;
  border-radius:12px;
  box-shadow:0 0 25px rgba(255, 0, 0, 0.25);
}

/* ================= ENTRY SCREEN ================= */
#entry-screen{
  position:fixed;
  inset:0;
  background:radial-gradient(circle at center,#140505 40%,#000 100%);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
  transition:opacity 1.2s ease, visibility 1.2s ease;
}

#entry-screen.hide{
  opacity:0;
  visibility:hidden;
}

.portal{
  position:relative;
  width:220px;
  height:220px;
  cursor:pointer;
}

.ring{
  position:absolute;
  inset:0;
  border-radius:50%;
  border:2px solid rgba(255, 0, 0, 0.4);
  filter:blur(.3px);
}

.ring1{
  animation:spin 10s linear infinite;
}

.ring2{
  inset:20px;
  border-color:rgba(255, 26, 26, 0.4);
  animation:spinReverse 14s linear infinite;
}

.core{
  position:absolute;
  inset:55px;
  border-radius:50%;
  background:radial-gradient(circle,var(--cyan),#440000);
  box-shadow:
    0 0 35px rgba(255, 0, 0, 0.8),
    inset 0 0 20px rgba(255, 255, 255, 0.25);
  animation:pulse 2.4s ease-in-out infinite;
}

.scan-line{
  position:absolute;
  left:0;
  right:0;
  top:0;
  height:3px;
  background:linear-gradient(90deg,transparent,var(--cyan),transparent);
  box-shadow:0 0 15px var(--cyan);
  animation:scan 2.2s linear infinite;
}

.portal-text{
  position:absolute;
  bottom:-40px;
  width:100%;
  text-align:center;
  font-family:Orbitron,sans-serif;
  letter-spacing:2px;
}

.portal-text span{
  display:block;
  font-size:.7rem;
  color:var(--muted);
}

.portal-text strong{
  color:var(--cyan);
  text-shadow:0 0 12px rgba(255, 0, 0, 0.8);
}

/* ================= HUD ENTRY ================= */
.hud.hidden{
  opacity:0;
  transform:scale(.85) translateY(40px);
  pointer-events:none;
}


.hud.show{
  animation:hudEnter 1.4s cubic-bezier(.2,.9,.2,1) forwards;
}

/* ================= ANIMATIONS ================= */
@keyframes spin{
  from{transform:rotate(0)}
  to{transform:rotate(360deg)}
}
@keyframes spinReverse{
  from{transform:rotate(360deg)}
  to{transform:rotate(0)}
}
@keyframes pulse{
  0%,100%{transform:scale(1)}
  50%{transform:scale(1.08)}
}
@keyframes scan{
  from{top:0}
  to{top:100%}
}
@keyframes hudEnter{
  from{opacity:0;transform:scale(.85) translateY(40px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}


/* ===== GALAXY BACKGROUND ===== */
#galaxy{
  position:fixed;
  inset:0;
  z-index:-2;
  background:radial-gradient(circle at center, #140505, #0a0202);
}

/* ================= GALLERY PANEL ================= */

.gallery-wrapper{
  width:100%;
  height:100%;
}

.gallery-header{
  margin-bottom:16px;
}
.gallery-header .line{
  height:1px;
  background:linear-gradient(90deg,var(--cyan),transparent);
}

/* CAROUSEL */
.carousel{
  position:relative;
  height:280px;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
}

.gallery-track{
  position:relative;
  width:100%;
  height:220px;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* SLIDES */
.slide{
  position:absolute;
  width:200px;
  height:260px;
  background:var(--glass);
  backdrop-filter:blur(14px);
  border:2px solid rgba(255,255,255,.15);
  border-radius:14px;
  overflow:hidden;
  transition:.6s cubic-bezier(.2,.8,.2,1);
  filter:brightness(.55);
  box-shadow:0 0 25px rgba(0,0,0,.5);
}

.slide img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.slide.active{
  filter:brightness(1);
  border-color:var(--orange);
  box-shadow:
    0 0 25px rgba(255, 26, 26, 0.6),
    0 0 45px rgba(255, 26, 26, 0.3);
}

/* NAV */
.nav{
  position:absolute;
  width:34px;
  height:34px;
  border-radius:50%;
  background:transparent;
  border:1px solid var(--orange);
  color:var(--orange);
  font-size:20px;
  cursor:pointer;
  z-index:10;
  transition:.3s;
}
.nav:hover{
  box-shadow:0 0 18px rgba(255, 26, 26, 0.6);
}

.nav.left{left:10px}
.nav.right{right:10px}

/* ===== FUTURISTIC PLAYER ===== */
.player{
  margin-top:auto;
  width:100%;
  padding:14px;
  border:1px solid rgba(255, 0, 0, 0.35);
  background:linear-gradient(180deg,#2f0808,#1d0505);
  box-shadow:
    inset 0 0 25px rgba(255, 0, 0, 0.15),
    0 0 25px rgba(255, 0, 0, 0.25);
  position:relative;
  overflow:hidden;
}

.player::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(
    120deg,
    transparent 30%,
    rgba(255, 0, 0, 0.15),
    transparent 70%
  );
  animation:playerScan 6s linear infinite;
  pointer-events:none;
}

@keyframes playerScan{
  from{transform:translateX(-100%)}
  to{transform:translateX(100%)}
}

.player-info{
  text-align:center;
  margin-bottom:10px;
}

#song-title{
  font-family:Orbitron,sans-serif;
  font-size:.45rem;
  letter-spacing:2px;
  color:var(--cyan);
  text-shadow:0 0 12px rgba(255, 0, 0, 0.8);
}

#song-artist{
  font-size:.4rem;
  color:var(--muted);
  letter-spacing:2px;
}

/* CONTROLS */
.controls{
  display:flex;
  justify-content:center;
  gap:14px;
  margin-bottom:10px;
}

.controls button{
  width:38px;
  height:38px;
  border-radius:50%;
  background:transparent;
  border:1px solid rgba(255, 0, 0, 0.5);
  color:var(--cyan);
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}

.controls button:hover{
  box-shadow:0 0 18px rgba(255, 0, 0, 0.7);
  color:var(--orange);
  border-color:var(--orange);
}

/* PROGRESS BAR */
.progress{
  height:4px;
  background:rgba(255, 0, 0, 0.15);
  border-radius:4px;
  overflow:hidden;
}

#progress-bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--cyan),var(--orange));
  box-shadow:0 0 12px rgba(255, 0, 0, 0.8);
}
/* ===== HOME CENTER ===== */
.home-center{
  height:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:26px;
  text-align:center;
}

/* ===== WELCOME TEXT ===== */
.welcome-text{
  font-family:Orbitron,sans-serif;
  font-size:2.1rem;
  letter-spacing:4px;
  color:var(--cyan);
  position:relative;
  text-shadow:
    0 0 12px rgba(255, 0, 0, 0.7),
    0 0 28px rgba(255, 0, 0, 0.4);
  animation:floatText 4s ease-in-out infinite;
}

/* GLITCH EFFECT */
.glitch::before,
.glitch::after{
  content:attr(data-text);
  position:absolute;
  left:0;
  width:100%;
  opacity:.7;
}

.glitch::before{
  color:#ff0000;
  animation:glitch1 2.5s infinite linear alternate-reverse;
}

.glitch::after{
  color:#ff0000;
  animation:glitch2 1.8s infinite linear alternate-reverse;
}

/* ===== FIRMA ===== */
.signature-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
}

.sig-label{
  font-size:.7rem;
  letter-spacing:3px;
  color:var(--muted);
}

.signature-gif{
  max-width:420px;
  max-height:220px;

}

/* ===== ANIMATIONS ===== */
@keyframes floatText{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-6px)}
}

@keyframes glitch1{
  0%{transform:translate(0)}
  20%{transform:translate(-2px,2px)}
  40%{transform:translate(-2px,-2px)}
  60%{transform:translate(2px,2px)}
  80%{transform:translate(2px,-2px)}
  100%{transform:translate(0)}
}

@keyframes glitch2{
  0%{transform:translate(0)}
  25%{transform:translate(2px,-2px)}
  50%{transform:translate(-2px,2px)}
  75%{transform:translate(2px,2px)}
  100%{transform:translate(0)}
}


#cursor{
  position: fixed;
  top: 0;
  left: 0;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: rgb(255, 0, 0);
  pointer-events: none;
  z-index: 9999;
  box-shadow:
    0 0 10px rgb(255, 0, 0),
    0 0 20px rgba(255, 0, 0, 0.8);
  transform: translate(-50%, -50%);
}

#cursor-trail{
  position: fixed;
  top: 0;
  left: 0;
  width: 34px;
  height: 34px;
  border-radius: 50%;
  border: 1px solid rgba(255, 0, 0, 0.6);
  pointer-events: none;
  z-index: 9998;
  transform: translate(-50%, -50%);
  box-shadow:
    0 0 20px rgba(255, 0, 0, 0.4);
  transition: transform .12s ease-out;
}

body, a, button, input, textarea, select {
  cursor: none !important;
}
body {
  cursor: none;
}
*,
*::before,
*::after {
  cursor: none !important;
}

.hud.show{
  opacity:1;
  transform:scale(1) translateY(0);
  pointer-events:auto;
}
#cursor,
#cursor-trail{
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
  z-index: 99999;
}

</style>
</head>


<body>

<script>
const panels=document.querySelectorAll('.panel');
function showPanel(id){
  panels.forEach(p=>{
    p.classList.remove('active');
    p.style.display = 'none';
  });

  const panel = document.getElementById(id);
  panel.style.display = 'block';

  // fuerza repaint
  panel.offsetHeight;

  panel.classList.add('active');
}


const tracks = [
  {
    src: 'music/8Uno, Airam Paez - Pelotero A La Bola.mp3',
    title: 'Pelotero A La Bola',
    artist: '8Uno, Airam Paez'
  },
  {
    src: 'music/Alan Walker Style & Leo Dan - Tú Llegaste Cuando Menos Te Esperaba.mp3',
    title: 'Tú Llegaste Cuando Menos Te Esperaba',
    artist: 'Alan Walker Style & Leo Dan'
  },
  {
    src: 'music/La Bamba.mp3',
    title: 'La Bamba',
    artist: ''
  }
];


let i=0;
const audio=document.getElementById('audio');
const titleEl = document.getElementById('song-title');
const artistEl = document.getElementById('song-artist');


function load(){
  audio.src = tracks[i].src;
  titleEl.textContent = tracks[i].title;
  artistEl.textContent = tracks[i].artist;

  audio.play();
  playBtn.textContent = '⏸';
}

const playBtn = document.getElementById('playBtn');

function togglePlay(){
  if(audio.paused){
    audio.play();
    playBtn.textContent = '⏸';
  }else{
    audio.pause();
    playBtn.textContent = '▶';
  }
}

function nextTrack(){i=(i+1)%tracks.length;load()}
function prevTrack(){i=(i-1+tracks.length)%tracks.length;load()}

audio.addEventListener('timeupdate', () => {
  const percent = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progress-bar').style.width = percent + '%';
});

audio.addEventListener('ended', nextTrack);

const entry = document.getElementById('entry-screen');
const portal = document.querySelector('.portal');
const hud = document.getElementById('hud');

portal.addEventListener('click', () => {
  entry.classList.add('hide');
  hud.classList.remove('hidden');
  hud.classList.add('show');

  load(); // 🔊 arranca la música al entrar
});


const canvas = document.getElementById("galaxy");
const ctx = canvas.getContext("2d");

let w, h, stars = [];

function resize(){
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
}
window.addEventListener("resize", resize);
resize();

/* ===== STAR CLASS ===== */
class Star{
  constructor(){
    this.reset();
  }
  reset(){
    this.x = Math.random() * w;
    this.y = Math.random() * h;
    this.z = Math.random() * w;
    this.radius = Math.random() * 1.5 + 0.2;
    this.speed = Math.random() * 0.3 + 0.05;
  }
  update(){
    this.z -= this.speed;
    if(this.z <= 0) this.reset();
  }
  draw(){
    const sx = (this.x - w/2) * (w / this.z) + w/2;
    const sy = (this.y - h/2) * (w / this.z) + h/2;
    const r = this.radius * (w / this.z);

    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI * 2);
    ctx.fillStyle = "rgba(128,0,0,.8)";
    ctx.fill();
  }
}

/* ===== INIT ===== */
for(let i=0;i<350;i++){
  stars.push(new Star());
}

/* ===== NEBULA ===== */
function nebula(){
  const g = ctx.createRadialGradient(
    w/2, h/2, 0,
    w/2, h/2, w
  );
  g.addColorStop(0,"rgba(59,0,0,.12)");
  g.addColorStop(0.4,"rgba(16,0,0,.08)");
  g.addColorStop(1,"rgba(0,0,0,0)");
  ctx.fillStyle = g;
  ctx.fillRect(0,0,w,h);
}

/* ===== LOOP ===== */
function animate(){
  ctx.clearRect(0,0,w,h);

  // deep space
  ctx.fillStyle = "#030000";
  ctx.fillRect(0,0,w,h);

  nebula();

  stars.forEach(s=>{
    s.update();
    s.draw();
  });

  requestAnimationFrame(animate);
}
animate();

/* ===== GALLERY LOGIC ===== */
const galleryTrack = document.getElementById('gallery-track');
const gallerySlides = galleryTrack.querySelectorAll('.slide');
let galleryIndex = 0;

function galleryUpdate(){
  gallerySlides.forEach((s,i)=>{
    const offset = i - galleryIndex;
    s.style.transform = `
      translateX(${offset * 260}px)
      scale(${offset === 0 ? 1 : 0.85})
    `;
    s.classList.toggle('active', offset === 0);
  });
}

function galleryNext(){
  galleryIndex = (galleryIndex + 1) % gallerySlides.length;
  galleryUpdate();
}

function galleryPrev(){
  galleryIndex = (galleryIndex - 1 + gallerySlides.length) % gallerySlides.length;
  galleryUpdate();
}

galleryUpdate();

const cursor = document.getElementById('cursor');
const trail = document.getElementById('cursor-trail');

let mouseX = 0, mouseY = 0;
let trailX = 0, trailY = 0;

window.addEventListener('mousemove', e => {
  mouseX = e.clientX;
  mouseY = e.clientY;

  cursor.style.left = mouseX + 'px';
  cursor.style.top  = mouseY + 'px';
});

function animateCursor(){
  trailX += (mouseX - trailX) * 0.15;
  trailY += (mouseY - trailY) * 0.15;

  trail.style.left = trailX + 'px';
  trail.style.top  = trailY + 'px';

  requestAnimationFrame(animateCursor);
}

animateCursor();
